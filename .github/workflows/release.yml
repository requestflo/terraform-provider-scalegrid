name: Release

# semantic-release runs on every push to main: it analyzes Conventional Commit
# messages, computes the next version, updates CHANGELOG.md, creates the tag,
# and then invokes GoReleaser (via @semantic-release/exec) to build and sign the
# Terraform Registry artifacts and publish the GitHub Release.
on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true

      - name: Verify build and tests
        run: |
          go build ./...
          go test ./... -timeout 120s

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          # Passphrase for non-interactive signing (empty if the key has none).
          GPG_PASSWORD: ${{ secrets.PASSPHRASE }}
        run: |
          npx --yes \
            -p semantic-release \
            -p @semantic-release/changelog \
            -p @semantic-release/git \
            -p @semantic-release/exec \
            semantic-release
